name: tests and production
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  app:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        # We will install the tests dependencies first
    - name: Install dependencies
      run: cd test && npm ci
    - name: Install Playwright Browsers
      run: cd test && npx playwright install --with-deps

    - name: Building and running docker compose
      run: ls && pwd && sleep 7 && docker compose -f compose.production.yaml up -d

    - name: Run Playwright tests
      run: cd test && sleep 10 && npx playwright test --project=firefox


    - name: Install Allure CLI
      run: cd test npm install -g allure-commandline --save-dev

    - name: Generate Allure report
      run: cd test && allure generate allure-results --clean -o allure-report

    - name: Shut down container
      run: docker compose -f compose.prod.yaml down

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: test/allure-report/


  deploy:
    needs: app
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
